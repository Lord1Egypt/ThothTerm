<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: deep lapis lazuli blue (ancient Egyptian sacred color) -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2a5e"/>
      <stop offset="100%" stop-color="#0a0f2e"/>
    </radialGradient>
    <radialGradient id="gold" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="60%" stop-color="#d4a800"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer ring (gold) -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#d4a800" stroke-width="4" opacity="0.8"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#d4a800" stroke-width="1" opacity="0.4"/>

  <!-- ───── SCARAB BEETLE (center, golden) ───── -->
  <!-- Scarab body -->
  <ellipse cx="256" cy="280" rx="72" ry="88" fill="url(#gold)" filter="url(#glow)"/>
  <!-- Scarab head -->
  <ellipse cx="256" cy="192" rx="36" ry="28" fill="url(#gold)"/>
  <!-- Scarab wings (left) -->
  <ellipse cx="176" cy="270" rx="62" ry="44" fill="#c8961a" transform="rotate(-20,176,270)"/>
  <!-- Scarab wings (right) -->
  <ellipse cx="336" cy="270" rx="62" ry="44" fill="#c8961a" transform="rotate(20,336,270)"/>
  <!-- Wing detail lines (left) -->
  <line x1="176" y1="242" x2="130" y2="220" stroke="#0a0f2e" stroke-width="1.5" opacity="0.6"/>
  <line x1="172" y1="258" x2="122" y2="248" stroke="#0a0f2e" stroke-width="1.5" opacity="0.6"/>
  <line x1="172" y1="274" x2="125" y2="272" stroke="#0a0f2e" stroke-width="1.5" opacity="0.6"/>
  <line x1="176" y1="290" x2="132" y2="296" stroke="#0a0f2e" stroke-width="1.5" opacity="0.6"/>
  <!-- Wing detail lines (right) -->
  <line x1="336" y1="242" x2="382" y2="220" stroke="#0a0f2e" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="258" x2="390" y2="248" stroke="#0a0f2e" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="274" x2="387" y2="272" stroke="#0a0f2e" stroke-width="1.5" opacity="0.6"/>
  <line x1="336" y1="290" x2="380" y2="296" stroke="#0a0f2e" stroke-width="1.5" opacity="0.6"/>
  <!-- Scarab legs (left) -->
  <line x1="216" y1="300" x2="170" y2="330" stroke="#d4a800" stroke-width="3" stroke-linecap="round"/>
  <line x1="214" y1="320" x2="162" y2="348" stroke="#d4a800" stroke-width="3" stroke-linecap="round"/>
  <line x1="216" y1="340" x2="168" y2="368" stroke="#d4a800" stroke-width="3" stroke-linecap="round"/>
  <!-- Scarab legs (right) -->
  <line x1="296" y1="300" x2="342" y2="330" stroke="#d4a800" stroke-width="3" stroke-linecap="round"/>
  <line x1="298" y1="320" x2="350" y2="348" stroke="#d4a800" stroke-width="3" stroke-linecap="round"/>
  <line x1="296" y1="340" x2="344" y2="368" stroke="#d4a800" stroke-width="3" stroke-linecap="round"/>
  <!-- Scarab antennae -->
  <line x1="240" y1="168" x2="218" y2="136" stroke="#d4a800" stroke-width="2" stroke-linecap="round"/>
  <line x1="272" y1="168" x2="294" y2="136" stroke="#d4a800" stroke-width="2" stroke-linecap="round"/>
  <circle cx="218" cy="134" r="4" fill="#ffd700"/>
  <circle cx="294" cy="134" r="4" fill="#ffd700"/>
  <!-- Scarab body stripe pattern -->
  <line x1="230" y1="230" x2="282" y2="230" stroke="#0a0f2e" stroke-width="2" opacity="0.5"/>
  <line x1="224" y1="252" x2="288" y2="252" stroke="#0a0f2e" stroke-width="2" opacity="0.5"/>
  <line x1="222" y1="274" x2="290" y2="274" stroke="#0a0f2e" stroke-width="2" opacity="0.5"/>
  <line x1="224" y1="296" x2="288" y2="296" stroke="#0a0f2e" stroke-width="2" opacity="0.5"/>
  <line x1="228" y1="318" x2="284" y2="318" stroke="#0a0f2e" stroke-width="2" opacity="0.5"/>
  <!-- Scarab eye -->
  <circle cx="244" cy="192" r="5" fill="#0a0f2e"/>
  <circle cx="268" cy="192" r="5" fill="#0a0f2e"/>

  <!-- ───── ANKH symbol (top center, turquoise) ───── -->
  <g transform="translate(256, 64) scale(0.7)" filter="url(#glow)">
    <!-- Ankh loop -->
    <ellipse cx="0" cy="-8" rx="18" ry="22" fill="none" stroke="#40e0d0" stroke-width="7"/>
    <!-- Ankh vertical bar -->
    <line x1="0" y1="14" x2="0" y2="58" stroke="#40e0d0" stroke-width="7" stroke-linecap="round"/>
    <!-- Ankh horizontal bar -->
    <line x1="-22" y1="30" x2="22" y2="30" stroke="#40e0d0" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- ───── Eye of Ra (bottom, small) ───── -->
  <g transform="translate(256, 418) scale(0.55)" opacity="0.9">
    <!-- Eye outline -->
    <ellipse cx="0" cy="0" rx="52" ry="30" fill="none" stroke="#ffd700" stroke-width="4"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="14" fill="#d4a800"/>
    <circle cx="0" cy="0" r="8" fill="#0a0f2e"/>
    <circle cx="-3" cy="-3" r="3" fill="#ffd700" opacity="0.8"/>
    <!-- Eye corner left -->
    <line x1="-52" y1="0" x2="-62" y2="10" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <!-- Eye corner right -->
    <line x1="52" y1="0" x2="68" y2="8" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <line x1="68" y1="8" x2="72" y2="20" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <line x1="72" y1="20" x2="60" y2="22" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <!-- Eyebrow -->
    <path d="M -52,-30 Q 0,-48 52,-30" fill="none" stroke="#ffd700" stroke-width="3"/>
    <!-- Tear marks (wadjet) -->
    <line x1="0" y1="14" x2="0" y2="30" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="30" x2="-8" y2="40" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ───── Stars / hieroglyph accent dots ───── -->
  <circle cx="80"  cy="80"  r="2.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="432" cy="80"  r="2.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="80"  cy="432" r="2.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="432" cy="432" r="2.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="100" cy="256" r="2"   fill="#40e0d0" opacity="0.6"/>
  <circle cx="412" cy="256" r="2"   fill="#40e0d0" opacity="0.6"/>
  <circle cx="120" cy="160" r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="392" cy="160" r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="120" cy="352" r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="392" cy="352" r="1.5" fill="#ffd700" opacity="0.5"/>

  <!-- Terminal prompt cursor glow (subtle, bottom right of scarab) -->
  <rect x="288" y="342" width="16" height="3" rx="1.5" fill="#40e0d0" opacity="0.6" filter="url(#glow)"/>
</svg>
