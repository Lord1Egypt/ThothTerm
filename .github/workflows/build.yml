name: Build ThothTerm

on:
  push:
    branches: [main, thothterm-phase1]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: Linux Build & Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt update && sudo apt install -y \
            build-essential cmake pkg-config libssl-dev \
            libx11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-icccm4-dev libxcb-keysyms1-dev libxcb-util-dev \
            libxcb-image0-dev libxcb-randr0-dev libxcb-ewmh-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libfreetype6-dev \
            libharfbuzz-dev libssh2-1-dev libzstd-dev \
            libwayland-dev \
            python3 python3-pip
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy on custom crates
        run: cargo clippy --manifest-path custom_crates/Cargo.toml --workspace -- -D warnings
      - name: Run custom crate tests
        run: cargo test --manifest-path custom_crates/Cargo.toml --workspace
      - name: Check binaries compile
        run: |
          cargo check --bin thothterm
          cargo check --bin thothterm-gui
      - name: Build release binaries
        run: |
          cargo build --release --bin thothterm
          cargo build --release --bin thothterm-gui
      - uses: actions/upload-artifact@v4
        with:
          name: thothterm-linux
          path: |
            target/release/thothterm
            target/release/thothterm-gui

  build-windows:
    name: Windows Build
    runs-on: windows-latest
    env:
      WGPU_BACKEND: dx12
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Run custom crate tests
        run: cargo test --manifest-path custom_crates/Cargo.toml --workspace
      - name: Check main binary compiles
        run: cargo check --bin thothterm
      - name: Build release binary
        run: cargo build --release --bin thothterm
      - uses: actions/upload-artifact@v4
        with:
          name: thothterm-windows
          path: target/release/thothterm.exe

  build-macos:
    name: macOS Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Run custom crate tests
        run: cargo test --manifest-path custom_crates/Cargo.toml --workspace
      - name: Check main binary compiles
        run: cargo check --bin thothterm
      - name: Build universal binary
        run: |
          cargo build --release --target aarch64-apple-darwin --bin thothterm
          cargo build --release --target x86_64-apple-darwin --bin thothterm
          lipo -create \
            target/aarch64-apple-darwin/release/thothterm \
            target/x86_64-apple-darwin/release/thothterm \
            -output target/thothterm-universal
      - uses: actions/upload-artifact@v4
        with:
          name: thothterm-macos
          path: target/thothterm-universal
